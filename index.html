<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PS2 Menu Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <div class="wave"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
</div>

<div class="menu">
    <h1 class="logo">Browser</h1>
    <ul>
        <li>Memory Card</li>
        <li>Settings</li>
        <li>System Info</li>
        <div class="particle" style="left:10%; animation-duration:15s;"></div>
<div class="particle" style="left:30%; animation-duration:18s;"></div>
<div class="particle" style="left:50%; animation-duration:22s;"></div>
<div class="particle" style="left:70%; animation-duration:26s;"></div>
<div class="particle" style="left:90%; animation-duration:30s;"></div>
    </ul>
</div>

</body>
</html>
