<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PS2 Menu Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Starfield -->
<div class="stars"></div>

<!-- Waves -->
<div class="background">
    <div class="wave"></div>
    <div class="wave wave2"></div>
    <div class="wave wave3"></div>
</div>

<!-- Particles -->
<div class="particle" style="left:10%; animation-duration:15s;"></div>
<div class="particle" style="left:25%; animation-duration:18s;"></div>
<div class="particle" style="left:40%; animation-duration:20s;"></div>
<div class="particle" style="left:60%; animation-duration:24s;"></div>
<div class="particle" style="left:75%; animation-duration:28s;"></div>
<div class="particle" style="left:90%; animation-duration:32s;"></div>

<!-- Menu -->
<div class="menu" data-text="menu">
    <h1 class="logo">Browser</h1>
    <ul>
        <li class="active">Memory Card</li>
        <li>Settings</li>
        <li>System Info</li>
    </ul>
</div>

</body>
</html>
